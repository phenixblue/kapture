version: 2

project_name: kapture

before:
  hooks:
    - go mod tidy

builds:
  - id: kapture
    main: ./cmd/kapture
    binary: kapture
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/phenixblue/kapture/internal/version.Version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

sboms:
  - artifacts: archive

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}

brews:
  - name: kapture
    homepage: https://github.com/phenixblue/kapture
    description: KubeVirt best-practices scanner for production readiness, security, and availability checks
    license: Apache-2.0
    repository:
      owner: phenixblue
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    test: |
      system "#{bin}/kapture", "version"
    install: |
      bin.install "kapture"

release:
  draft: false
  prerelease: auto
